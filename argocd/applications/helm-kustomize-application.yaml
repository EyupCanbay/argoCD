apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grade-submission-helm-kustomize
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL:  https://github.com/EyupCanbay/argocd
    targetRevision: HEAD
    path: kustomize/overlays/prod-with-helm
  
  destination:
    server: https://kubernetes.default.svc
    namespace: grade-demo-helm-kustomize
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
