apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web-app
  namespace: demo-app
  annotations: 
    secret.reloader.stakater.com/reload: "db-secret"
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: demo-web
  template: 
    metadata:
      labels:
        app: demo-web 
    spec: 
      containers:
        - name: app 
          image: alpine:3.19
          command: ["/bin/sh", "-c", "while true; do echo \"Uygulama calisiyor. Guncel Sifre: $DB_PASS\"; sleep 5; done"]
          env:
          - name: DB_PASS 
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: DATABASE_PASSWORD  

