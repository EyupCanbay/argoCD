apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vault

helmCharts:
  - name: vault
    repo: https://helm.releases.hashicorp.com
    version: 0.28.0
    releaseName: vault
    namespace: vault
    valuesFile: values.yaml

patches:
  - path: patch-statefulset.yaml
    target:
      kind: StatefulSet
      name: vault