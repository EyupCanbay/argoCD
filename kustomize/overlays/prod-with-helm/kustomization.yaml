apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: grade-submission
    repo: ""  
    releaseName: prod-release
    version: 0.2.0
    valuesFile: values.yaml
    includeCRDs: false

patches:
  - path: initcontainer-patch.yaml
    target:
      kind: Deployment
      name: prod-release-grade-submission-api

namePrefix: prod-
